# Serve the built SPA and proxy API/image paths to the api service.
# Mirrors the dev proxy in vite.config.ts so the browser stays same-origin
# (no CORS) — the backend service name resolves on the compose network.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow the 10 MB inspiration-image upload (Spring caps the request at 12 MB).
    client_max_body_size 12m;

    # Re-resolve the backend at runtime via Docker's embedded DNS, so an API
    # container rebuild (new IP) doesn't leave nginx pointing at a dead address.
    # A variable in proxy_pass forces per-request resolution (vs. resolve-once).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://api:8081;

    # API + image paths → Spring Boot backend (full URI passed through).
    location /api/     { proxy_pass $backend; proxy_set_header Host $host; }
    location /static/  { proxy_pass $backend; proxy_set_header Host $host; }
    location /catalog/ { proxy_pass $backend; proxy_set_header Host $host; }

    # SPA client-side routing — fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}